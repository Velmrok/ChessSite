version: '3.8'

secrets:
  db_password:
    file: ./.secrets/db_password.txt
  
services:
  db:
    image: postgres:15
    container_name: chess_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: chess_backend
    working_dir: /app
    ports:
      - "5062:5062"
    volumes:
      - ./backend:/app
      - /app/bin
      - /app/obj
      - dotnet_packages:/root/.nuget/packages
      - ./backend/wwwroot/uploads:/app/wwwroot/uploads
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5062
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - Storage__Provider=Local
      - ConnectionStrings__Host=db
      - ConnectionStrings__Database=${POSTGRES_DB}
      - ConnectionStrings__Username=${POSTGRES_USER}
    secrets:
      - db_password
    command: >
      sh -c "
      dotnet restore &&
      dotnet watch run --no-launch-profile
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5062/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: chess_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: >
      sh -c "
      npm install &&
      npm run dev
      "
    depends_on:
      backend : 
        condition: service_healthy
    networks:
      - frontend-net

  redis:
    image: redis:7-alpine
    container_name: chess_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  dotnet_packages:
  frontend_node_modules:
networks:
  frontend-net:
  backend-net:
    
