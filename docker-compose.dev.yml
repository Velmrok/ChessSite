version: '3.8'

services:
  db:
    image: postgres:15
    container_name: chess_db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: chess_backend
    working_dir: /app
    ports:
      - "5062:5062"
    volumes:
      - ./backend:/app
      - /app/bin
      - /app/obj
      - dotnet_packages:/root/.nuget/packages
      - backend_uploads:/app/wwwroot/uploads
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5062
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      
    command: >
      sh -c "
      dotnet restore &&
      dotnet watch run --no-launch-profile
      "
    depends_on:
      - db
      - redis

  frontend:
    image: node:20-alpine
    container_name: chess_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: >
      sh -c "
      npm install &&
      npm run dev
      "
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: chess_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
  postgres_data:
  dotnet_packages:
  backend_uploads:
  frontend_node_modules: